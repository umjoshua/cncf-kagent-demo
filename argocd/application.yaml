apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/umjoshua/cncf-kagent-demo.git
    targetRevision: HEAD
    path: chart/api
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    # automated:
    #   selfHeal: false
    #   prune: false
    syncOptions:
      - CreateNamespace=true